<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshaya Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

<canvas class="particle-canvas" id="particle-canvas" aria-hidden="true"></canvas>
<div class="ambient ambient-one"></div>
<div class="ambient ambient-two"></div>

<main class="swipe-page">
    <section class="intro-shell" aria-label="Profile introduction">
        <img src="aks.jpeg" class="profile-image" alt="Portrait of Akshaya Srinithi">
        <div class="intro-copy">
            <h1>Akshaya Srinithi S.V.</h1>
        </div>
    </section>

    <section class="deck-shell" aria-label="Swipe portfolio cards">
        <div class="swipe-strip" aria-hidden="true">
            <div class="swipe-strip-track">
                <span>Explore Through My World Of Tech, Projects And Academia</span>
                <span>Explore Through My World Of Tech, Projects And Academia</span>
                <span>Explore Through My World Of Tech, Projects And Academia</span>
            </div>
        </div>

        <div class="deck-frame">
            <div class="card-stack" id="card-stack"></div>
        </div>

        <div class="deck-timeline" id="deck-timeline" aria-label="Portfolio card timeline"></div>
    </section>
</main>

<template id="portfolio-card-template">
    <article class="swipe-card">
        <div class="card-chrome">
            <span class="card-chip"></span>
            <span class="card-count"></span>
        </div>
        <div class="card-visual">
            <div class="visual-glow"></div>
            <div class="visual-content">
                <span class="visual-label"></span>
                <h2 class="card-title"></h2>
                <p class="card-summary"></p>
            </div>
        </div>
        <div class="card-body">
            <p class="card-detail"></p>
            <div class="card-tags"></div>
            <div class="card-actions"></div>
        </div>
    </article>
</template>

<script src="swipe.js"></script>

</body>
</html>
